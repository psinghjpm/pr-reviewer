---
# Redis Deployment — queue + cache for review workers
# For production: use managed Redis (AWS ElastiCache, Redis Cloud, etc.)

apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: pr-reviewer
data:
  redis.conf: |
    # Performance tuning for PR review workload
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    save ""  # Disable RDB snapshots (queue data is transient)
    appendonly yes
    appendfsync everysec
    tcp-backlog 511
    timeout 0
    tcp-keepalive 300

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: pr-reviewer
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: pr-reviewer
  labels:
    app: redis
spec:
  replicas: 1  # Single instance (use Redis Sentinel/Cluster for HA)
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - redis-server
            - /etc/redis/redis.conf
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: config
              mountPath: /etc/redis
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 2Gi
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: redis-config
        - name: data
          emptyDir: {}  # For production: use PersistentVolumeClaim

