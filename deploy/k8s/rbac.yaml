---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: webhook-handler
  namespace: pr-reviewer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-creator
  namespace: pr-reviewer
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: webhook-handler-job-creator
  namespace: pr-reviewer
subjects:
  - kind: ServiceAccount
    name: webhook-handler
    namespace: pr-reviewer
roleRef:
  kind: Role
  name: job-creator
  apiGroup: rbac.authorization.k8s.io
