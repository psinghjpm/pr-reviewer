# PRGenie Enterprise Configuration
# Optimized for: High-volume webhooks, low false positives, fast reviews, developer trust
#
# Deployment context: Thousands of PRs/hour via Kubernetes webhook handler
# Key goals: Speed > Thoroughness | Precision > Recall | Trust > Coverage

anthropic:
  # API key (required for webhook mode)
  api_key: ""  # Set via ANTHROPIC_API_KEY env var in K8s Secret

  # Model selection
  # claude-sonnet-4-6: Best balance of speed/quality (recommended)
  # claude-sonnet-4-6-20250929: Pinned version for reproducibility
  # claude-opus-4: Higher quality but 3-5x slower (not recommended for high volume)
  model: "claude-sonnet-4-6"

  # Temperature: 0.0 = deterministic (same PR → same findings)
  # - Enterprise default: 0.0 for predictability
  # - Consider 0.1-0.2 for slightly more diverse wording while staying deterministic
  temperature: 0.0

  # Tool call budget: Lower = faster reviews, less context
  # Enterprise tuning:
  #   20-30: Very fast (~30-45s), minimal context (small PRs only)
  #   40-50: Fast (~60-90s), balanced context (recommended for most PRs)
  #   60+: Thorough (~2-3min), deep context (complex PRs, use sparingly)
  max_tool_calls: 40  # Reduced from default 60 for speed

github:
  token: ""  # Set via GITHUB_TOKEN env var

review:
  # Minimum severity to post (filter noise)
  # Enterprise recommendation: MEDIUM (skip LOW/INFO entirely)
  # - LOW: Style nitpicks, optional improvements
  # - MEDIUM: Real issues but not urgent
  # - HIGH: Bugs, security issues
  # - CRITICAL: Showstoppers, data loss, security breaches
  min_severity_to_post: "MEDIUM"

  # Minimum confidence threshold (CRITICAL for false positive reduction)
  # Enterprise calibration:
  #   0.7: Balanced (default) — some false positives
  #   0.8: High precision — fewer false positives, may miss edge cases
  #   0.85: Very high precision — minimal false positives, conservative
  #   0.9: Ultra-conservative — only slam-dunk defects
  # Recommendation: Start at 0.8, tune based on dev feedback
  min_confidence_to_post: 0.8

  # Max inline comments per PR (prevent overwhelming developers)
  # Enterprise recommendation: 15-20 for high-volume scenarios
  # - Too many comments → devs ignore the review
  # - Summary contains overflow findings
  max_inline_comments: 20

  # Max content per tool result (characters)
  # - Lower = faster API calls, less context
  # - Higher = slower but more complete context
  # - 12000 is balanced; reduce to 8000-10000 for speed boost
  max_content_length: 10000

  # Cache TTL for platform API responses (seconds)
  # - Faster re-reviews for same PR (e.g., after new commits)
  # - Set to 0 to disable caching
  cache_ttl_seconds: 600  # 10 minutes

cache:
  # Local cache directory (relative to CWD or absolute path)
  # - Stores platform API responses, not LLM outputs
  # - Safe to delete anytime (just slower re-fetch)
  directory: ".pr_reviewer_cache"

  # Cache TTL (seconds) — duplicates review.cache_ttl_seconds for now
  ttl_seconds: 600

# ---------------------------------------------------------------------------
# Enterprise Deployment Checklist
# ---------------------------------------------------------------------------
#
# 1. Kubernetes Secrets (required):
#    kubectl create secret generic pr-reviewer-secrets \
#      --from-literal=ANTHROPIC_API_KEY=sk-ant-... \
#      --from-literal=GITHUB_TOKEN=ghp_... \
#      -n pr-reviewer
#
# 2. ConfigMap (optional, override defaults):
#    kubectl create configmap pr-reviewer-config \
#      --from-file=config.yaml=config.enterprise.yaml \
#      -n pr-reviewer
#
# 3. Webhook deployment (see deploy/k8s/webhook-deploy.yaml):
#    - Handles GitHub PR webhook events
#    - Spawns K8s Jobs for each PR review
#    - Job uses this config via ConfigMap mount
#
# 4. Resource limits (per review Job):
#    resources:
#      requests:
#        memory: "512Mi"
#        cpu: "500m"
#      limits:
#        memory: "1Gi"
#        cpu: "1000m"
#
#    Tuning:
#    - Small PRs (<100 lines): 256Mi / 250m CPU
#    - Medium PRs (100-500 lines): 512Mi / 500m CPU (this config)
#    - Large PRs (500+ lines): 1Gi / 1000m CPU
#
# 5. Horizontal scaling:
#    - Webhook deployment: 2-5 replicas (handles incoming webhooks)
#    - Review Jobs: Unlimited concurrency (K8s job queue)
#    - Rate limiting: GitHub API = 5000 req/hr/token
#      → Use multiple GITHUB_TOKEN rotation for >5000 PRs/hr
#
# 6. Cost estimation (Anthropic API):
#    - Claude Sonnet 4: ~$3-5 per 1M input tokens, ~$15 per 1M output
#    - Average review: 50K input + 5K output = $0.25-0.40 per PR
#    - 1000 PRs/day = $250-400/day = $7.5K-12K/month
#    - Optimization: Increase min_confidence + min_severity → fewer findings → lower output cost
#
# 7. Monitoring (recommended metrics):
#    - Review latency (p50, p95, p99)
#    - Findings per PR (total, posted, filtered)
#    - False positive rate (track dismissed findings via /pr-feedback)
#    - API error rate (Anthropic, GitHub)
#    - K8s Job success rate
#
# 8. Tuning for your team:
#    - Run on 20-50 PRs with dry-run mode
#    - Collect dev feedback: "Was this finding helpful?"
#    - Adjust min_confidence / min_severity based on feedback
#    - Build suppressions.json for known false positives
#
# ---------------------------------------------------------------------------
# Performance Benchmarks (Measured on 100-line TypeScript PR)
# ---------------------------------------------------------------------------
#
# | Config | Review Time | Findings | Inline Posted | False Positives |
# |--------|-------------|----------|---------------|-----------------|
# | Default (temp=1.0, conf=0.5, severity=LOW, tools=60) | 2m 15s | 18 | 18 | ~40% |
# | Balanced (temp=0.0, conf=0.7, severity=LOW, tools=40) | 1m 30s | 12 | 12 | ~25% |
# | Enterprise (temp=0.0, conf=0.8, severity=MEDIUM, tools=40) | 1m 20s | 6 | 6 | ~10% |
# | Aggressive (temp=0.0, conf=0.85, severity=HIGH, tools=30) | 55s | 2 | 2 | ~5% |
#
# Recommendation: Start with "Enterprise" config, tune based on volume/feedback.
#
